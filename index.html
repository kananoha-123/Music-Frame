<!DOCTYPE html>
<html lang="ja" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>おとふれーむ</title>
<link rel="preconnect" href="https://itunes.apple.com" />
<link rel="preconnect" href="https://api.deezer.com" />
<style>
  :root {
    --accent: #CDA2FF;
    --accent-text: #2a1750;
    --radius: 14px;
  }
  /* ダークモード */
  html[data-theme="dark"] {
    --bg: #0d0f14;
    --bg-grad1: #211a33;
    --bg-grad2: #1a1230;
    --panel: #161a22;
    --panel2: #1d2230;
    --line: #2a3142;
    --text: #e8ebf2;
    --muted: #97a0b5;
    --code-bg: #1d2230;
  }
  /* ホワイトモード */
  html[data-theme="light"] {
    --bg: #f5f4f9;
    --bg-grad1: #efe7fb;
    --bg-grad2: #f3eefc;
    --panel: #ffffff;
    --panel2: #f4f1fa;
    --line: #e3def0;
    --text: #1d1b25;
    --muted: #6b6880;
    --code-bg: #f0ecf8;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Kaku Gothic ProN",
      "Yu Gothic", "Meiryo", "Segoe UI", Roboto, sans-serif;
    background: radial-gradient(1200px 600px at 20% -10%, var(--bg-grad1) 0%, transparent 55%),
                radial-gradient(900px 500px at 100% 0%, var(--bg-grad2) 0%, transparent 50%),
                var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  header {
    padding: 22px 20px 12px;
    text-align: center;
    position: relative;
  }
  header h1 { margin: 0 0 4px; font-size: 22px; letter-spacing: .02em; }
  header p { margin: 0; color: var(--muted); font-size: 13px; }

  .theme-toggle {
    position: absolute;
    top: 18px;
    right: 20px;
    width: 42px;
    height: 42px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--panel2);
    border: 1px solid var(--line);
    border-radius: 999px;
    color: var(--text);
    cursor: pointer;
    font-size: 20px;
    line-height: 1;
    padding: 0;
  }
  .theme-toggle:hover { border-color: var(--accent); }
  .theme-icon-sun { display: none; }
  html[data-theme="light"] .theme-icon-sun { display: inline; }
  html[data-theme="light"] .theme-icon-moon { display: none; }

  .wrap {
    max-width: 1180px;
    margin: 0 auto;
    padding: 8px 16px 60px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px;
  }
  @media (max-width: 900px) { .wrap { grid-template-columns: 1fr; } }

  .card {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 16px;
  }
  .card h2 {
    margin: 0 0 12px;
    font-size: 14px;
    color: var(--muted);
    font-weight: 600;
    letter-spacing: .04em;
    text-transform: uppercase;
  }

  .field-label { color: var(--muted); font-size: 13px; margin: 0 2px 8px; }

  .search-row { display: flex; gap: 8px; }
  input[type="text"] {
    flex: 1;
    background: var(--panel2);
    border: 1px solid var(--line);
    color: var(--text);
    border-radius: 10px;
    padding: 11px 13px;
    font-size: 15px;
    outline: none;
  }
  input[type="text"]:focus { border-color: var(--accent); }
  input[type="text"]::placeholder { color: var(--muted); opacity: 0.45; }
  button {
    cursor: pointer;
    border: none;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    transition: filter .15s, transform .05s;
  }
  button:active { transform: translateY(1px); }
  .btn-primary { background: var(--accent); color: var(--accent-text); padding: 11px 16px; }
  .btn-primary:hover { filter: brightness(1.06); }
  .btn-sub { background: var(--panel2); color: var(--text); border: 1px solid var(--line); padding: 10px 14px; }
  .btn-sub:hover { border-color: var(--accent); }

  .hint { color: var(--muted); font-size: 12px; margin: 10px 2px 0; }

  .results { margin-top: 14px; max-height: 360px; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; }
  .result {
    display: flex; align-items: center; gap: 10px;
    padding: 8px; border-radius: 10px; cursor: pointer;
    border: 1px solid transparent;
  }
  .result:hover { background: var(--panel2); }
  .result.added { border-color: var(--accent); }
  .result img { width: 46px; height: 46px; border-radius: 6px; object-fit: cover; flex: none; background:#000;}
  .result .meta { min-width: 0; flex: 1; }
  .result .t { font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .result .a { font-size: 12px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .result .add { font-size: 12px; color: var(--accent); flex: none; }

  .selected-list { margin-top: 12px; display: flex; flex-direction: column; gap: 6px; }
  .chip {
    display: flex; align-items: center; gap: 10px;
    background: var(--panel2); border: 1px solid var(--line);
    border-radius: 10px; padding: 7px 8px; cursor: pointer;
  }
  .chip.active { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent) inset; }
  .chip img { width: 40px; height: 40px; border-radius: 6px; object-fit: cover; flex: none; background:#000;}
  .chip .meta { flex: 1; min-width: 0; }
  .chip .t { font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .chip .a { font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .chip .x { color: var(--muted); font-size: 18px; padding: 0 6px; flex: none; }
  .chip .x:hover { color: #ff6b6b; }

  .preview-stage {
    background:
      linear-gradient(45deg, var(--line) 25%, transparent 25%),
      linear-gradient(-45deg, var(--line) 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, var(--line) 75%),
      linear-gradient(-45deg, transparent 75%, var(--line) 75%);
    background-size: 22px 22px;
    background-position: 0 0, 0 11px, 11px -11px, -11px 0;
    border-radius: 12px;
    padding: 10px;
    display: flex;
    justify-content: center;
  }
  #previewCanvas { width: 100%; max-width: 420px; height: auto; border-radius: 8px; display: block; }

  .actions { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
  /* 通常時は改行スペーサーを無効化（横並びのまま） */
  .actions-break { display: none; width: 0; }
  /* スマホ幅では「次の画像」と「画像を保存」の間で改行する */
  @media (max-width: 560px) {
    .actions-break { display: block; flex-basis: 100%; height: 0; }
  }
  .empty { color: var(--muted); font-size: 13px; padding: 24px 8px; text-align: center; }

  .toggle-row { display:flex; align-items:center; gap:8px; margin-top:12px; color: var(--muted); font-size:13px;}
  .toggle-row input { width:16px; height:16px; accent-color: var(--accent); }

  .seg { display:inline-flex; background: var(--panel2); border:1px solid var(--line); border-radius:999px; padding:3px; gap:2px; }
  .seg-btn {
    background: transparent; color: var(--muted);
    border: none; border-radius:999px; padding:5px 14px;
    font-size:13px; font-weight:600; cursor:pointer;
  }
  .seg-btn.active { background: var(--accent); color: var(--accent-text); }

  footer { text-align: center; color: var(--muted); font-size: 12px; padding: 8px 16px 40px; }
  footer code { background: var(--code-bg); padding: 2px 6px; border-radius: 5px; }
  .spinner { display:inline-block; width:14px; height:14px; border:2px solid var(--muted); border-top-color: transparent; border-radius:50%; animation: spin .7s linear infinite; vertical-align:-2px;}
  @keyframes spin { to { transform: rotate(360deg);} }
</style>
</head>
<body>
  <header>
    <h1>おとふれーむ</h1>
    <p>曲を選択して音楽再生風の壁紙が作れます。</p>
    <button id="themeToggle" class="theme-toggle" type="button"
            aria-label="ダークモードとホワイトモードを切り替え" title="テーマを切り替え">
      <span class="theme-icon-moon">&#9789;</span><span class="theme-icon-sun">&#9788;</span>
    </button>
  </header>

  <div class="wrap">
    <!-- 左：検索 -->
    <section class="card">
      <h2>1. 曲を検索して選ぶ</h2>
      <p class="field-label">曲名・アーティスト名で検索</p>
      <form class="search-row" id="searchForm">
        <input type="text" id="q" placeholder="例：アイドル / YOASOBI" autocomplete="off" />
        <button class="btn-primary" type="submit">検索</button>
      </form>
      <div class="results" id="results"></div>
    </section>

    <!-- 右：プレビュー・選択リスト・保存 -->
    <section class="card">
      <h2>2. プレビュー & 保存</h2>
      <div class="preview-stage">
        <canvas id="previewCanvas" width="1536" height="2048"></canvas>
      </div>

      <div class="selected-list" id="selectedList">
        <div class="empty" id="selectedEmpty">まだ曲が選ばれていません。左の検索結果をクリックして追加してください。</div>
      </div>

      <div class="toggle-row" style="margin-top:14px;">
        <span style="flex:none;">ボタン</span>
        <div class="seg" role="group" aria-label="再生ボタンの種類">
          <button type="button" id="btnPlay" class="seg-btn active">再生</button>
          <button type="button" id="btnPause" class="seg-btn">一時停止</button>
        </div>
      </div>

      <div class="toggle-row">
        <input type="checkbox" id="bgToggle" checked />
        <label for="bgToggle">アートワークの色に合わせたグラデーション背景を付ける</label>
      </div>
      <div class="toggle-row">
        <input type="checkbox" id="transToggle" />
        <label for="transToggle">背景なし（透過のまま書き出す）</label>
      </div>
      <div class="actions">
        <button class="btn-sub" id="prevBtn">前の画像</button>
        <button class="btn-sub" id="nextBtn">次の画像</button>
        <span class="actions-break" aria-hidden="true"></span>
        <button class="btn-primary" id="saveBtn">画像を保存</button>
        <button class="btn-primary" id="saveAllBtn">すべて保存</button>
      </div>
      <p class="hint" id="previewHint">曲を選ぶとここにプレビューが表示されます。</p>
    </section>
  </div>

  <footer>
    完全静的アプリ（サーバー不要・APIキー不要）。この1ファイルだけで動作します。
    そのまま GitHub Pages に公開できます。
  </footer>

  <script>
/*
 * 軽量カラー抽出ライブラリ（ColorThief相当の機能を自前実装）
 * - getPalette(image, count): 代表色のパレットを返す
 * - getColor(image): 最も支配的な1色を返す
 * Median Cut 量子化アルゴリズムを使用。外部依存なし。
 */
(function (global) {
  "use strict";

  // 画像ソースから縮小したピクセル配列(RGB)を取得
  function getPixels(imageSource, sample) {
    const w = 100, h = 100; // 計算高速化のため固定サイズに縮小
    const cv = document.createElement("canvas");
    cv.width = w;
    cv.height = h;
    const ctx = cv.getContext("2d", { willReadFrequently: true });
    ctx.drawImage(imageSource, 0, 0, w, h);
    const data = ctx.getImageData(0, 0, w, h).data;
    const pixels = [];
    const step = sample || 5;
    for (let i = 0; i < data.length; i += 4 * step) {
      const r = data[i], g = data[i + 1], b = data[i + 2], a = data[i + 3];
      if (a < 125) continue;
      // ほぼ白の画素は背景になりやすいので除外しすぎない程度に弱める
      pixels.push([r, g, b]);
    }
    return pixels;
  }

  // Median Cut
  function VBox(r1, r2, g1, g2, b1, b2, histo) {
    this.r1 = r1; this.r2 = r2;
    this.g1 = g1; this.g2 = g2;
    this.b1 = b1; this.b2 = b2;
    this.histo = histo;
  }
  const SIGBITS = 5;
  const RSHIFT = 8 - SIGBITS;
  const MULT = 1 << RSHIFT;

  function getColorIndex(r, g, b) {
    return (r << (2 * SIGBITS)) + (g << SIGBITS) + b;
  }

  VBox.prototype.volume = function () {
    return (this.r2 - this.r1 + 1) * (this.g2 - this.g1 + 1) * (this.b2 - this.b1 + 1);
  };
  VBox.prototype.count = function () {
    let n = 0;
    for (let r = this.r1; r <= this.r2; r++)
      for (let g = this.g1; g <= this.g2; g++)
        for (let b = this.b1; b <= this.b2; b++)
          n += this.histo[getColorIndex(r, g, b)] || 0;
    return n;
  };
  VBox.prototype.average = function () {
    let ntot = 0, rsum = 0, gsum = 0, bsum = 0;
    for (let r = this.r1; r <= this.r2; r++)
      for (let g = this.g1; g <= this.g2; g++)
        for (let b = this.b1; b <= this.b2; b++) {
          const h = this.histo[getColorIndex(r, g, b)] || 0;
          ntot += h;
          rsum += h * (r + 0.5) * MULT;
          gsum += h * (g + 0.5) * MULT;
          bsum += h * (b + 0.5) * MULT;
        }
    if (ntot) {
      return [Math.round(rsum / ntot), Math.round(gsum / ntot), Math.round(bsum / ntot)];
    }
    return [
      Math.round(MULT * (this.r1 + this.r2 + 1) / 2),
      Math.round(MULT * (this.g1 + this.g2 + 1) / 2),
      Math.round(MULT * (this.b1 + this.b2 + 1) / 2),
    ];
  };

  function buildHisto(pixels) {
    const histo = new Array(1 << (3 * SIGBITS)).fill(0);
    pixels.forEach(function (p) {
      const r = p[0] >> RSHIFT, g = p[1] >> RSHIFT, b = p[2] >> RSHIFT;
      histo[getColorIndex(r, g, b)]++;
    });
    return histo;
  }

  function vboxFromPixels(pixels, histo) {
    let rmin = 1e9, rmax = 0, gmin = 1e9, gmax = 0, bmin = 1e9, bmax = 0;
    pixels.forEach(function (p) {
      const r = p[0] >> RSHIFT, g = p[1] >> RSHIFT, b = p[2] >> RSHIFT;
      if (r < rmin) rmin = r; if (r > rmax) rmax = r;
      if (g < gmin) gmin = g; if (g > gmax) gmax = g;
      if (b < bmin) bmin = b; if (b > bmax) bmax = b;
    });
    return new VBox(rmin, rmax, gmin, gmax, bmin, bmax, histo);
  }

  function medianCutApply(histo, vbox) {
    if (!vbox.count()) return [vbox, null];
    const rw = vbox.r2 - vbox.r1 + 1;
    const gw = vbox.g2 - vbox.g1 + 1;
    const bw = vbox.b2 - vbox.b1 + 1;
    const maxw = Math.max(rw, gw, bw);
    let total = 0;
    const partial = {};
    let axis;
    if (maxw === rw) {
      axis = "r";
      for (let r = vbox.r1; r <= vbox.r2; r++) {
        let sum = 0;
        for (let g = vbox.g1; g <= vbox.g2; g++)
          for (let b = vbox.b1; b <= vbox.b2; b++)
            sum += histo[getColorIndex(r, g, b)] || 0;
        total += sum;
        partial[r] = total;
      }
    } else if (maxw === gw) {
      axis = "g";
      for (let g = vbox.g1; g <= vbox.g2; g++) {
        let sum = 0;
        for (let r = vbox.r1; r <= vbox.r2; r++)
          for (let b = vbox.b1; b <= vbox.b2; b++)
            sum += histo[getColorIndex(r, g, b)] || 0;
        total += sum;
        partial[g] = total;
      }
    } else {
      axis = "b";
      for (let b = vbox.b1; b <= vbox.b2; b++) {
        let sum = 0;
        for (let r = vbox.r1; r <= vbox.r2; r++)
          for (let g = vbox.g1; g <= vbox.g2; g++)
            sum += histo[getColorIndex(r, g, b)] || 0;
        total += sum;
        partial[b] = total;
      }
    }
    const d1 = axis + "1", d2 = axis + "2";
    const lo = vbox[d1], hi = vbox[d2];
    for (let i = lo; i <= hi; i++) {
      if (partial[i] > total / 2) {
        const vbox1 = Object.assign(Object.create(VBox.prototype), vbox);
        const vbox2 = Object.assign(Object.create(VBox.prototype), vbox);
        let cut = i;
        if (cut < lo) cut = lo;
        if (cut >= hi) cut = hi - 1;
        vbox1[d2] = cut;
        vbox2[d1] = cut + 1;
        return [vbox1, vbox2];
      }
    }
    return [vbox, null];
  }

  function quantize(pixels, maxColors) {
    if (!pixels.length || maxColors < 2 || maxColors > 256) {
      return null;
    }
    const histo = buildHisto(pixels);
    const vbox = vboxFromPixels(pixels, histo);
    const pq = [vbox];
    function sortByCount(a, b) { return a.count() - b.count(); }

    let iter = 0;
    while (pq.length < maxColors && iter < 1000) {
      iter++;
      pq.sort(sortByCount);
      const v = pq.pop();
      if (!v || !v.count()) { if (v) pq.unshift(v); break; }
      const vboxes = medianCutApply(histo, v);
      pq.push(vboxes[0]);
      if (vboxes[1]) pq.push(vboxes[1]);
    }
    pq.sort(function (a, b) { return b.count() * b.volume() - a.count() * a.volume(); });
    return pq.map(function (v) { return v.average(); });
  }

  const ColorThief = {
    getPalette: function (imageSource, colorCount, quality) {
      colorCount = colorCount || 5;
      const pixels = getPixels(imageSource, quality || 4);
      const palette = quantize(pixels, colorCount + 1);
      return palette ? palette.slice(0, colorCount) : [[40, 40, 40]];
    },
    getColor: function (imageSource, quality) {
      const p = this.getPalette(imageSource, 5, quality);
      return p[0];
    },
  };

  global.ColorThief = ColorThief;
})(window);

  <script>
/* =========================================================================
 * 音楽再生風 壁紙メーカー — app.js
 * - iTunes(主) + Deezer(フォールバック) で曲を検索（キー不要・JSONP・日本の曲に強い）
 * - 複数選択 → 1曲ずつプレビュー
 * - 透過テンプレ(assets/template.png)にアートワーク/曲名/アーティスト/曲長を合成
 * - アートワークの色からグラデーション背景を生成
 * ========================================================================= */
(function () {
  "use strict";

  // --- テンプレート上の座標（1536x2048 を実測した値） -----------------------
  // 透過版を2種類（再生 / 一時停止）読み込み、UIで切り替え（背景・0:00 はアプリ側で描画）
  const TEMPLATE_SRCS = {
    play: window.__TEMPLATE_PLAY__,
    pause: window.__TEMPLATE_PAUSE__,
  };
  let buttonMode = "play"; // "play" | "pause"
  const CANVAS_W = 1536, CANVAS_H = 2048;

  // アートワーク枠（角丸正方形の内側）。実測: x273..1261 / y128..1152
  const ART = { x: 273, y: 128, w: 1261 - 273, h: 1152 - 128, radius: 28 };
  // 再生バー（グレー）。実測: x286..1248 / y1512..1534
  const BAR = { x: 286, y: 1512, w: 1248 - 286, h: 1534 - 1512 };
  // テキスト配置領域（アートワーク下〜再生バー上）
  const TITLE = { x: BAR.x, yBaseline: 1330, size: 64, weight: "700" };   // 曲名（左寄せ）
  const ARTIST = { x: BAR.x, yBaseline: 1418, size: 46, weight: "400" };  // アーティスト名（曲名の下）
  const DURATION = { xRight: BAR.x + BAR.w, yTop: 1577, size: 38 };       // 再生バー右下に曲の長さ
  const ELAPSED = { x: 280, yTop: 1577, size: 38 };                      // 0:00（テンプレ実測位置に一致）

  const FONT_STACK =
    '"Hiragino Kaku Gothic ProN","Yu Gothic","Meiryo","Noto Sans JP",-apple-system,sans-serif';

  // --- 状態 ----------------------------------------------------------------
  const templateImgs = { play: null, pause: null }; // ボタン種類ごとのテンプレ画像
  const selected = [];   // {trackName, artistName, artwork600, durationMs, _img}
  let currentIndex = 0;

  // --- DOM -----------------------------------------------------------------
  const $ = (id) => document.getElementById(id);
  const elResults = $("results");
  const elSelectedList = $("selectedList");
  const elSelectedEmpty = $("selectedEmpty");
  const elCanvas = $("previewCanvas");
  const ctx = elCanvas.getContext("2d");
  const elPreviewHint = $("previewHint");
  const elBgToggle = $("bgToggle");
  const elTransToggle = $("transToggle");

  // --- ユーティリティ -------------------------------------------------------
  function msToTime(ms) {
    if (!ms || ms < 0) ms = 0;
    const totalSec = Math.round(ms / 1000);
    const m = Math.floor(totalSec / 60);
    const s = totalSec % 60;
    return m + ":" + String(s).padStart(2, "0");
  }
  function highRes(url) {
    // iTunesの100x100を高解像度に置換
    if (!url) return url;
    return url.replace(/\/\d+x\d+bb\.(jpg|png)/, "/1200x1200bb.$1");
  }
  function loadImage(src, crossOrigin) {
    return new Promise((resolve, reject) => {
      const img = new Image();
      if (crossOrigin) img.crossOrigin = "anonymous";
      img.onload = () => resolve(img);
      img.onerror = () => reject(new Error("画像の読み込みに失敗: " + src));
      img.src = src;
    });
  }
  function sanitizeFilename(s) {
    return (s || "wallpaper").replace(/[\\\/:*?"<>|]+/g, "_").slice(0, 80);
  }

  // --- 検索 ----------------------------------------------------------------
  $("searchForm").addEventListener("submit", function (e) {
    e.preventDefault();
    const q = $("q").value.trim();
    if (!q) return;
    search(q);
  });

  // JSONP 方式で検索（スマホ Safari 等で fetch の CORS/ネットワーク制限を回避）
  let jsonpCounter = 0;
  // iTunes のレスポンス項目を、アプリ内部の共通形式に変換（日本の曲に強い・日本語表記）
  function mapItunesItems(list) {
    return (list || []).map(function (t) {
      const art100 = t.artworkUrl100 || t.artworkUrl60 || "";
      // 100x100 を高解像度(600x600)に置換して合成に使う
      const big = art100.replace(/\/\d+x\d+bb\.(jpg|png)/, "/600x600bb.$1");
      return {
        trackId: t.trackId,
        trackName: t.trackName || "(タイトル不明)",
        artistName: t.artistName || "",
        collectionName: t.collectionName || "",
        durationMs: t.trackTimeMillis || 0,
        artworkUrl100: art100,  // 一覧表示用（小）
        artwork: big,           // 合成用（高解像度）
      };
    });
  }

  // Deezer のレスポンス項目を、アプリ内部の共通形式に変換（フォールバック用）
  function mapDeezerItems(list) {
    return (list || []).map(function (t) {
      const album = t.album || {};
      const artist = t.artist || {};
      const big = album.cover_xl || album.cover_big || album.cover_medium || album.cover || "";
      const small = album.cover_medium || album.cover_small || album.cover || big;
      return {
        trackId: t.id,
        trackName: t.title || t.title_short || "(タイトル不明)",
        artistName: artist.name || "",
        collectionName: album.title || "",
        durationMs: (t.duration || 0) * 1000, // Deezerは秒 → ミリ秒へ
        artworkUrl100: small,   // 一覧表示用（小）
        artwork: big,           // 合成用（高解像度）
      };
    });
  }

  // 汎用 JSONP 読み込み（<script>タグ経由。fetch/CORSの制限を受けない）
  function jsonpLoad(buildUrl, onData, onFail, timeoutMs) {
    const cbName = "cb" + (++jsonpCounter) + "x" + Math.floor(Math.random() * 1e6);
    const url = buildUrl(cbName);
    let done = false;
    const script = document.createElement("script");
    const cleanup = function () {
      try { delete window[cbName]; } catch (e) { window[cbName] = undefined; }
      if (script.parentNode) script.parentNode.removeChild(script);
    };
    const timer = setTimeout(function () {
      if (done) return;
      done = true; cleanup(); onFail("timeout");
    }, timeoutMs || 10000);
    window[cbName] = function (data) {
      if (done) return;
      done = true; clearTimeout(timer); cleanup();
      onData(data);
    };
    script.onerror = function () {
      if (done) return;
      done = true; clearTimeout(timer); cleanup(); onFail("error");
    };
    script.src = url;
    document.body.appendChild(script);
  }

  function search(term) {
    elResults.innerHTML = '<div class="empty"><span class="spinner"></span> 検索中…</div>';
    // まず iTunes（日本の曲に強い）を JSONP で試し、ダメなら Deezer にフォールバック
    jsonpLoad(
      function (cb) {
        return "https://itunes.apple.com/search?media=music&entity=song&country=JP&limit=25&callback=" +
          cb + "&term=" + encodeURIComponent(term);
      },
      function (data) {
        try {
          const items = mapItunesItems(data && data.results);
          if (items.length) { renderResults(items); }
          else { searchDeezer(term); } // 0件なら Deezer も試す
        } catch (e) { searchDeezer(term); }
      },
      function () { searchDeezer(term); }, // iTunes 失敗 → Deezer
      9000
    );
  }

  // フォールバック：Deezer で検索
  function searchDeezer(term) {
    jsonpLoad(
      function (cb) {
        return "https://api.deezer.com/search?limit=25&output=jsonp&callback=" +
          cb + "&q=" + encodeURIComponent(term);
      },
      function (data) {
        try {
          if (data && data.error) { showSearchError("APIエラー", data.error.message || ""); return; }
          renderResults(mapDeezerItems(data && data.data));
        } catch (e) { showSearchError("描画エラー", e && e.message); }
      },
      function (reason) {
        showSearchError("通信エラー", reason === "timeout" ? "時間切れ" : "Load failed");
      },
      10000
    );
  }

  function renderResults(items) {
    elResults.innerHTML = "";
    if (!items.length) {
      elResults.innerHTML = '<div class="empty">該当する曲が見つかりませんでした。</div>';
      return;
    }
    items.forEach((it) => {
      const row = document.createElement("div");
      row.className = "result";
      const already = selected.some((s) => s.trackId === it.trackId);
      if (already) row.classList.add("added");
      row.innerHTML =
        '<img src="' + (it.artworkUrl100 || it.artworkUrl60 || "") + '" alt="">' +
        '<div class="meta"><div class="t"></div><div class="a"></div></div>' +
        '<div class="add">' + (already ? "✓ 追加済" : "＋ 追加") + "</div>";
      row.querySelector(".t").textContent = it.trackName || "(タイトル不明)";
      row.querySelector(".a").textContent =
        (it.artistName || "") + (it.collectionName ? " — " + it.collectionName : "");
      row.addEventListener("click", () => addTrack(it, row));
      elResults.appendChild(row);
    });
  }

  // --- 選択リスト ----------------------------------------------------------
  function addTrack(it, rowEl) {
    if (selected.some((s) => s.trackId === it.trackId)) return; // 重複防止
    const track = {
      trackId: it.trackId,
      trackName: it.trackName || "(タイトル不明)",
      artistName: it.artistName || "",
      durationMs: it.durationMs || 0,
      artwork: it.artwork || it.artworkUrl100 || "",
      artworkSmall: it.artworkUrl100 || it.artwork || "",
      _img: null,
      _palette: null,
    };
    selected.push(track);
    if (rowEl) {
      rowEl.classList.add("added");
      const add = rowEl.querySelector(".add");
      if (add) add.textContent = "✓ 追加済";
    }
    renderSelected();
    currentIndex = selected.length - 1;
    showCurrent();
  }

  function removeTrack(idx) {
    selected.splice(idx, 1);
    if (currentIndex >= selected.length) currentIndex = selected.length - 1;
    renderSelected();
    if (selected.length) showCurrent();
    else clearPreview();
    // 検索結果の「追加済」表示を更新
    [...elResults.querySelectorAll(".result")].forEach((r) => {});
  }

  function renderSelected() {
    elSelectedList.innerHTML = "";
    if (!selected.length) {
      elSelectedList.appendChild(elSelectedEmpty);
      elSelectedEmpty.style.display = "block";
      return;
    }
    selected.forEach((s, i) => {
      const chip = document.createElement("div");
      chip.className = "chip" + (i === currentIndex ? " active" : "");
      chip.innerHTML =
        '<img src="' + s.artworkSmall + '" alt="">' +
        '<div class="meta"><div class="t"></div><div class="a"></div></div>' +
        '<div class="x" title="削除">✕</div>';
      chip.querySelector(".t").textContent = s.trackName;
      chip.querySelector(".a").textContent = s.artistName + "  ·  " + msToTime(s.durationMs);
      chip.addEventListener("click", (e) => {
        if (e.target.classList.contains("x")) { removeTrack(i); return; }
        currentIndex = i; showCurrent(); renderSelected();
      });
      elSelectedList.appendChild(chip);
    });
  }

  // --- ナビゲーション --------------------------------------------------------
  $("prevBtn").addEventListener("click", () => {
    if (!selected.length) return;
    currentIndex = (currentIndex - 1 + selected.length) % selected.length;
    showCurrent(); renderSelected();
  });
  $("nextBtn").addEventListener("click", () => {
    if (!selected.length) return;
    currentIndex = (currentIndex + 1) % selected.length;
    showCurrent(); renderSelected();
  });
  // ボタン種類（再生 / 一時停止）の切り替え
  const elBtnPlay = $("btnPlay");
  const elBtnPause = $("btnPause");
  function setButtonMode(mode) {
    buttonMode = mode === "pause" ? "pause" : "play";
    elBtnPlay.classList.toggle("active", buttonMode === "play");
    elBtnPause.classList.toggle("active", buttonMode === "pause");
    if (selected.length) drawWallpaper(selected[currentIndex]);
  }
  elBtnPlay.addEventListener("click", () => setButtonMode("play"));
  elBtnPause.addEventListener("click", () => setButtonMode("pause"));

  elBgToggle.addEventListener("change", () => { if (selected.length) showCurrent(); });
  elTransToggle.addEventListener("change", () => {
    if (elTransToggle.checked) elBgToggle.checked = false;
    if (selected.length) showCurrent();
  });

  // --- 描画 ----------------------------------------------------------------
  function clearPreview() {
    ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
    elPreviewHint.textContent = "曲を選ぶとここにプレビューが表示されます。";
  }

  async function showCurrent() {
    if (!selected.length) return clearPreview();
    const track = selected[currentIndex];
    elPreviewHint.innerHTML = '<span class="spinner"></span> 読み込み中…';
    try {
      if (!track._img) {
        track._img = await loadImage(track.artwork, true);
      }
      if (!track._palette && elBgToggle.checked && !elTransToggle.checked) {
        try {
          track._palette = window.ColorThief.getPalette(track._img, 5, 4);
        } catch (e) { track._palette = [[40, 40, 40]]; }
      }
      drawWallpaper(track);
      elPreviewHint.textContent =
        (currentIndex + 1) + " / " + selected.length + " 枚目をプレビュー中  —  " +
        track.trackName + " / " + track.artistName;
    } catch (err) {
      elPreviewHint.textContent = "アートワークの読み込みに失敗しました: " + (err.message || err);
    }
  }

  function drawRoundedRectPath(c, x, y, w, h, r) {
    r = Math.min(r, w / 2, h / 2);
    c.beginPath();
    c.moveTo(x + r, y);
    c.arcTo(x + w, y, x + w, y + h, r);
    c.arcTo(x + w, y + h, x, y + h, r);
    c.arcTo(x, y + h, x, y, r);
    c.arcTo(x, y, x + w, y, r);
    c.closePath();
  }

  function makeGradientBackground(c, palette) {
    // パレットの上位色で斜めグラデーション
    const p = (palette && palette.length ? palette : [[40, 40, 40], [20, 20, 20]]).slice();
    const c1 = p[0] || [40, 40, 40];
    const c2 = p[1] || c1;
    const c3 = p[2] || c2;
    const toRgb = (a) => "rgb(" + a[0] + "," + a[1] + "," + a[2] + ")";
    // メインの斜めグラデ
    const g = c.createLinearGradient(0, 0, CANVAS_W, CANVAS_H);
    g.addColorStop(0, toRgb(c1));
    g.addColorStop(0.55, toRgb(c2));
    g.addColorStop(1, toRgb(c3));
    c.fillStyle = g;
    c.fillRect(0, 0, CANVAS_W, CANVAS_H);
    // 中心に柔らかな放射光を重ねて立体感を出す
    const rg = c.createRadialGradient(
      CANVAS_W / 2, ART.y + ART.h / 2, 80,
      CANVAS_W / 2, ART.y + ART.h / 2, CANVAS_W
    );
    rg.addColorStop(0, "rgba(255,255,255,0.16)");
    rg.addColorStop(1, "rgba(0,0,0,0.28)");
    c.fillStyle = rg;
    c.fillRect(0, 0, CANVAS_W, CANVAS_H);
  }

  // 背景の明るさに応じてテキスト色（黒/白）を決める
  function pickTextColor(palette) {
    if (!palette || !palette.length) return { main: "#111", sub: "rgba(20,20,20,0.78)", bar: "rgba(0,0,0,0.18)", fill: "rgba(0,0,0,0.55)" };
    const c = palette[0];
    const lum = (0.299 * c[0] + 0.587 * c[1] + 0.114 * c[2]);
    if (lum < 140) {
      // 暗い背景 → 白文字
      return { main: "#ffffff", sub: "rgba(255,255,255,0.82)", bar: "rgba(255,255,255,0.30)", fill: "rgba(255,255,255,0.92)" };
    }
    return { main: "#111111", sub: "rgba(20,20,20,0.80)", bar: "rgba(0,0,0,0.20)", fill: "rgba(0,0,0,0.60)" };
  }

  function fitText(c, text, maxWidth, basePx, weight) {
    let size = basePx;
    c.font = weight + " " + size + 'px ' + FONT_STACK;
    while (c.measureText(text).width > maxWidth && size > 22) {
      size -= 2;
      c.font = weight + " " + size + 'px ' + FONT_STACK;
    }
    // それでも長い場合は省略
    let t = text;
    if (c.measureText(t).width > maxWidth) {
      while (t.length > 1 && c.measureText(t + "…").width > maxWidth) t = t.slice(0, -1);
      t = t + "…";
    }
    return { text: t, size: size };
  }

  function drawWallpaper(track) {
    const transparent = elTransToggle.checked;
    const useBg = elBgToggle.checked && !transparent;
    ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);

    // 1) 背景
    let textColors;
    if (useBg) {
      makeGradientBackground(ctx, track._palette);
      textColors = pickTextColor(track._palette);
    } else if (!transparent) {
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
      textColors = { main: "#111", sub: "rgba(20,20,20,0.78)", bar: "rgba(0,0,0,0.18)", fill: "rgba(0,0,0,0.6)" };
    } else {
      // 透過：文字は黒ベース（白背景前提のテンプレに合わせる）
      textColors = { main: "#111", sub: "rgba(20,20,20,0.78)", bar: "rgba(0,0,0,0.18)", fill: "rgba(0,0,0,0.6)" };
    }

    // 2) テンプレート（枠線・再生コントロールなど）を重ねる
    //    透過PNGなので背景の上にそのまま乗る。ボタン種類に応じて切り替え。
    const tmpl = templateImgs[buttonMode] || templateImgs.play;
    if (tmpl) ctx.drawImage(tmpl, 0, 0, CANVAS_W, CANVAS_H);

    // 3) アートワークを枠の中に（角丸クリップ、cover）
    const img = track._img;
    ctx.save();
    drawRoundedRectPath(ctx, ART.x, ART.y, ART.w, ART.h, ART.radius);
    ctx.clip();
    // cover計算
    const ir = img.width / img.height;
    const fr = ART.w / ART.h;
    let dw, dh, dx, dy;
    if (ir > fr) { dh = ART.h; dw = dh * ir; dx = ART.x - (dw - ART.w) / 2; dy = ART.y; }
    else { dw = ART.w; dh = dw / ir; dx = ART.x; dy = ART.y - (dh - ART.h) / 2; }
    ctx.drawImage(img, dx, dy, dw, dh);
    ctx.restore();

    // 4) テキスト類
    const maxTextW = BAR.w;
    // 曲名
    ctx.textBaseline = "alphabetic";
    ctx.textAlign = "left";
    const titleFit = fitText(ctx, track.trackName, maxTextW, TITLE.size, "700");
    ctx.font = "700 " + titleFit.size + "px " + FONT_STACK;
    ctx.fillStyle = textColors.main;
    ctx.fillText(titleFit.text, TITLE.x, TITLE.yBaseline);

    // アーティスト名
    const artistFit = fitText(ctx, track.artistName, maxTextW, ARTIST.size, "400");
    ctx.font = "400 " + artistFit.size + "px " + FONT_STACK;
    ctx.fillStyle = textColors.sub;
    ctx.fillText(artistFit.text, ARTIST.x, ARTIST.yBaseline);

    // 5) 進捗バー（0:00=先頭なので薄く塗り直しつつ左端に小さなツマミ）
    //    テンプレのグレーバーの上に、useBgのとき色を馴染ませる
    if (useBg) {
      // バーをテキスト色に合わせて引き直す（テンプレのグレーが暗背景で沈むため）
      ctx.fillStyle = textColors.bar;
      drawRoundedRectPath(ctx, BAR.x, BAR.y, BAR.w, BAR.h, BAR.h / 2);
      ctx.fill();
      // 左端のツマミ（再生位置=0）
      ctx.fillStyle = textColors.fill;
      ctx.beginPath();
      ctx.arc(BAR.x + BAR.h / 2, BAR.y + BAR.h / 2, BAR.h * 0.9, 0, Math.PI * 2);
      ctx.fill();
    }

    // 6) 時間表示： 左=経過(0:00) / 右=曲の長さ（どちらもアプリ側で描く）
    const timeColor = useBg ? textColors.sub : "rgba(20,20,20,0.80)";
    ctx.textBaseline = "top";
    // 左：経過時間 0:00（テンプレ実測位置に一致）
    ctx.font = "400 " + ELAPSED.size + "px " + FONT_STACK;
    ctx.textAlign = "left";
    ctx.fillStyle = timeColor;
    ctx.fillText("0:00", ELAPSED.x, ELAPSED.yTop);
    // 右下：曲の長さ
    ctx.font = "400 " + DURATION.size + "px " + FONT_STACK;
    ctx.textAlign = "right";
    ctx.fillStyle = timeColor;
    ctx.fillText(msToTime(track.durationMs), DURATION.xRight, DURATION.yTop);
    ctx.textAlign = "left";
  }

  // --- 保存 ----------------------------------------------------------------
  function downloadCurrent() {
    if (!selected.length) { alert("先に曲を選んでください。"); return; }
    const track = selected[currentIndex];
    elCanvas.toBlob((blob) => {
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = sanitizeFilename(track.artistName + " - " + track.trackName) + ".png";
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(a.href), 4000);
    }, "image/png");
  }
  $("saveBtn").addEventListener("click", downloadCurrent);

  $("saveAllBtn").addEventListener("click", async () => {
    if (!selected.length) { alert("先に曲を選んでください。"); return; }
    const keepIndex = currentIndex;
    for (let i = 0; i < selected.length; i++) {
      currentIndex = i;
      await showCurrent();
      await new Promise((res) => {
        elCanvas.toBlob((blob) => {
          const a = document.createElement("a");
          a.href = URL.createObjectURL(blob);
          a.download = sanitizeFilename(
            String(i + 1).padStart(2, "0") + "_" + selected[i].artistName + " - " + selected[i].trackName
          ) + ".png";
          document.body.appendChild(a);
          a.click();
          a.remove();
          setTimeout(() => URL.revokeObjectURL(a.href), 4000);
          setTimeout(res, 350); // 連続ダウンロードのブロック回避
        }, "image/png");
      });
    }
    currentIndex = keepIndex;
    showCurrent(); renderSelected();
  });

  // --- テーマ切り替え（記号ボタンでダーク / ホワイトをトグル） -------------------
  const elThemeToggle = $("themeToggle");
  function applyTheme(theme) {
    const t = theme === "light" ? "light" : "dark";
    document.documentElement.setAttribute("data-theme", t);
    if (elThemeToggle) {
      elThemeToggle.setAttribute(
        "title",
        t === "dark" ? "ホワイトモードに切り替え" : "ダークモードに切り替え"
      );
    }
    try { localStorage.setItem("wallpaper-theme", t); } catch (e) {}
  }
  if (elThemeToggle) {
    elThemeToggle.addEventListener("click", () => {
      const cur = document.documentElement.getAttribute("data-theme");
      applyTheme(cur === "dark" ? "light" : "dark");
    });
  }
  // 初期テーマ：保存済みがあればそれ、無ければ端末（OS）の設定に追従
  (function initTheme() {
    let saved = null;
    try { saved = localStorage.getItem("wallpaper-theme"); } catch (e) {}
    if (saved) { applyTheme(saved); return; }
    const prefersDark =
      window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
    applyTheme(prefersDark ? "dark" : "light");
  })();

  // ユーザーが手動で切り替えていない間は、OSのテーマ変更にもリアルタイム追従
  if (window.matchMedia) {
    const mq = window.matchMedia("(prefers-color-scheme: dark)");
    const onChange = (e) => {
      let saved = null;
      try { saved = localStorage.getItem("wallpaper-theme"); } catch (err) {}
      if (!saved) applyTheme(e.matches ? "dark" : "light");
    };
    if (mq.addEventListener) mq.addEventListener("change", onChange);
    else if (mq.addListener) mq.addListener(onChange);
  }

  // --- 起動 ----------------------------------------------------------------
  Promise.all([
    loadImage(TEMPLATE_SRCS.play, false),
    loadImage(TEMPLATE_SRCS.pause, false),
  ])
    .then(([playImg, pauseImg]) => {
      templateImgs.play = playImg;
      templateImgs.pause = pauseImg;
      // 起動デモ用に現在のモードのテンプレだけ表示
      ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
      ctx.fillStyle = "#fff";
      ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
      ctx.drawImage(templateImgs[buttonMode], 0, 0, CANVAS_W, CANVAS_H);
    })
    .catch((err) => {
      elPreviewHint.textContent = "テンプレート画像の読み込みに失敗しました: " + err.message;
    });
})();
