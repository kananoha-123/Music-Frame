<!DOCTYPE html>
<html lang="ja" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>音楽再生風 壁紙メーカー</title>
<link rel="preconnect" href="https://itunes.apple.com" />
<style>
  :root {
    --accent: #CDA2FF;
    --accent-text: #2a1750;
    --radius: 14px;
  }
  /* ダークモード */
  html[data-theme="dark"] {
    --bg: #0d0f14;
    --bg-grad1: #211a33;
    --bg-grad2: #1a1230;
    --panel: #161a22;
    --panel2: #1d2230;
    --line: #2a3142;
    --text: #e8ebf2;
    --muted: #97a0b5;
    --code-bg: #1d2230;
  }
  /* ホワイトモード */
  html[data-theme="light"] {
    --bg: #f5f4f9;
    --bg-grad1: #efe7fb;
    --bg-grad2: #f3eefc;
    --panel: #ffffff;
    --panel2: #f4f1fa;
    --line: #e3def0;
    --text: #1d1b25;
    --muted: #6b6880;
    --code-bg: #f0ecf8;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Kaku Gothic ProN",
      "Yu Gothic", "Meiryo", "Segoe UI", Roboto, sans-serif;
    background: radial-gradient(1200px 600px at 20% -10%, var(--bg-grad1) 0%, transparent 55%),
                radial-gradient(900px 500px at 100% 0%, var(--bg-grad2) 0%, transparent 50%),
                var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  header {
    padding: 22px 20px 12px;
    text-align: center;
    position: relative;
  }
  header h1 { margin: 0 0 4px; font-size: 22px; letter-spacing: .02em; }
  header p { margin: 0; color: var(--muted); font-size: 13px; }

  .theme-toggle {
    position: absolute;
    top: 18px;
    right: 20px;
    width: 42px;
    height: 42px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--panel2);
    border: 1px solid var(--line);
    border-radius: 999px;
    color: var(--text);
    cursor: pointer;
    font-size: 20px;
    line-height: 1;
    padding: 0;
  }
  .theme-toggle:hover { border-color: var(--accent); }
  .theme-icon-sun { display: none; }
  html[data-theme="light"] .theme-icon-sun { display: inline; }
  html[data-theme="light"] .theme-icon-moon { display: none; }

  .wrap {
    max-width: 1180px;
    margin: 0 auto;
    padding: 8px 16px 60px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px;
  }
  @media (max-width: 900px) { .wrap { grid-template-columns: 1fr; } }

  .card {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 16px;
  }
  .card h2 {
    margin: 0 0 12px;
    font-size: 14px;
    color: var(--muted);
    font-weight: 600;
    letter-spacing: .04em;
    text-transform: uppercase;
  }

  .field-label { color: var(--muted); font-size: 13px; margin: 0 2px 8px; }

  .search-row { display: flex; gap: 8px; }
  input[type="text"] {
    flex: 1;
    background: var(--panel2);
    border: 1px solid var(--line);
    color: var(--text);
    border-radius: 10px;
    padding: 11px 13px;
    font-size: 15px;
    outline: none;
  }
  input[type="text"]:focus { border-color: var(--accent); }
  input[type="text"]::placeholder { color: var(--muted); opacity: 0.45; }
  button {
    cursor: pointer;
    border: none;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    transition: filter .15s, transform .05s;
  }
  button:active { transform: translateY(1px); }
  .btn-primary { background: var(--accent); color: var(--accent-text); padding: 11px 16px; }
  .btn-primary:hover { filter: brightness(1.06); }
  .btn-sub { background: var(--panel2); color: var(--text); border: 1px solid var(--line); padding: 10px 14px; }
  .btn-sub:hover { border-color: var(--accent); }

  .hint { color: var(--muted); font-size: 12px; margin: 10px 2px 0; }

  .results { margin-top: 14px; max-height: 360px; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; }
  .result {
    display: flex; align-items: center; gap: 10px;
    padding: 8px; border-radius: 10px; cursor: pointer;
    border: 1px solid transparent;
  }
  .result:hover { background: var(--panel2); }
  .result.added { border-color: var(--accent); }
  .result img { width: 46px; height: 46px; border-radius: 6px; object-fit: cover; flex: none; background:#000;}
  .result .meta { min-width: 0; flex: 1; }
  .result .t { font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .result .a { font-size: 12px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .result .add { font-size: 12px; color: var(--accent); flex: none; }

  .selected-list { margin-top: 12px; display: flex; flex-direction: column; gap: 6px; }
  .chip {
    display: flex; align-items: center; gap: 10px;
    background: var(--panel2); border: 1px solid var(--line);
    border-radius: 10px; padding: 7px 8px; cursor: pointer;
  }
  .chip.active { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent) inset; }
  .chip img { width: 40px; height: 40px; border-radius: 6px; object-fit: cover; flex: none; background:#000;}
  .chip .meta { flex: 1; min-width: 0; }
  .chip .t { font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .chip .a { font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .chip .x { color: var(--muted); font-size: 18px; padding: 0 6px; flex: none; }
  .chip .x:hover { color: #ff6b6b; }

  .preview-stage {
    background:
      linear-gradient(45deg, var(--line) 25%, transparent 25%),
      linear-gradient(-45deg, var(--line) 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, var(--line) 75%),
      linear-gradient(-45deg, transparent 75%, var(--line) 75%);
    background-size: 22px 22px;
    background-position: 0 0, 0 11px, 11px -11px, -11px 0;
    border-radius: 12px;
    padding: 10px;
    display: flex;
    justify-content: center;
  }
  #previewCanvas { width: 100%; max-width: 420px; height: auto; border-radius: 8px; display: block; }

  .actions { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
  /* 通常時は改行スペーサーを無効化（横並びのまま） */
  .actions-break { display: none; width: 0; }
  /* スマホ幅では「次の画像」と「画像を保存」の間で改行する */
  @media (max-width: 560px) {
    .actions-break { display: block; flex-basis: 100%; height: 0; }
  }
  .empty { color: var(--muted); font-size: 13px; padding: 24px 8px; text-align: center; }

  .toggle-row { display:flex; align-items:center; gap:8px; margin-top:12px; color: var(--muted); font-size:13px;}
  .toggle-row input { width:16px; height:16px; accent-color: var(--accent); }

  .seg { display:inline-flex; background: var(--panel2); border:1px solid var(--line); border-radius:999px; padding:3px; gap:2px; }
  .seg-btn {
    background: transparent; color: var(--muted);
    border: none; border-radius:999px; padding:5px 14px;
    font-size:13px; font-weight:600; cursor:pointer;
  }
  .seg-btn.active { background: var(--accent); color: var(--accent-text); }

  footer { text-align: center; color: var(--muted); font-size: 12px; padding: 8px 16px 40px; }
  footer code { background: var(--code-bg); padding: 2px 6px; border-radius: 5px; }
  .spinner { display:inline-block; width:14px; height:14px; border:2px solid var(--muted); border-top-color: transparent; border-radius:50%; animation: spin .7s linear infinite; vertical-align:-2px;}
  @keyframes spin { to { transform: rotate(360deg);} }
</style>
</head>
<body>
  <header>
    <h1>音楽再生風 壁紙メーカー</h1>
    <p>曲を選択して音楽再生風の壁紙が作れます。</p>
    <button id="themeToggle" class="theme-toggle" type="button"
            aria-label="ダークモードとホワイトモードを切り替え" title="テーマを切り替え">
      <span class="theme-icon-moon">&#9789;</span><span class="theme-icon-sun">&#9788;</span>
    </button>
  </header>

  <div class="wrap">
    <!-- 左：検索 -->
    <section class="card">
      <h2>1. 曲を検索して選ぶ</h2>
      <p class="field-label">曲名・アーティスト名で検索</p>
      <form class="search-row" id="searchForm">
        <input type="text" id="q" placeholder="例：アイドル / YOASOBI" autocomplete="off" />
        <button class="btn-primary" type="submit">検索</button>
      </form>
      <div class="results" id="results"></div>
    </section>

    <!-- 右：プレビュー・選択リスト・保存 -->
    <section class="card">
      <h2>2. プレビュー & 保存</h2>
      <div class="preview-stage">
        <canvas id="previewCanvas" width="1536" height="2048"></canvas>
      </div>

      <div class="selected-list" id="selectedList">
        <div class="empty" id="selectedEmpty">まだ曲が選ばれていません。左の検索結果をクリックして追加してください。</div>
      </div>

      <div class="toggle-row" style="margin-top:14px;">
        <span style="flex:none;">ボタン</span>
        <div class="seg" role="group" aria-label="再生ボタンの種類">
          <button type="button" id="btnPlay" class="seg-btn active">再生</button>
          <button type="button" id="btnPause" class="seg-btn">一時停止</button>
        </div>
      </div>

      <div class="toggle-row">
        <input type="checkbox" id="bgToggle" checked />
        <label for="bgToggle">アートワークの色に合わせたグラデーション背景を付ける</label>
      </div>
      <div class="toggle-row">
        <input type="checkbox" id="transToggle" />
        <label for="transToggle">背景なし（透過のまま書き出す）</label>
      </div>
      <div class="actions">
        <button class="btn-sub" id="prevBtn">前の画像</button>
        <button class="btn-sub" id="nextBtn">次の画像</button>
        <span class="actions-break" aria-hidden="true"></span>
        <button class="btn-primary" id="saveBtn">画像を保存</button>
        <button class="btn-primary" id="saveAllBtn">すべて保存</button>
      </div>
      <p class="hint" id="previewHint">曲を選ぶとここにプレビューが表示されます。</p>
    </section>
  </div>

  <footer>
    完全静的アプリ（サーバー不要・APIキー不要）。テンプレート画像は <code>assets/template.png</code>。
    そのまま GitHub Pages に公開できます。
  </footer>

  <script src="js/colorthief.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
